<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Game Jam - WASD Sync Test</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #networkPanel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            color: white;
            font-family: 'Consolas', monospace;
            border-radius: 6px;
            z-index: 1000;
            border: 2px solid gold;
            width: 290px;
        }

        .net-title {
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 6px;
            margin: 6px 0;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            background: #555;
            color: white;
        }

        .btn-host {
            background: #28a745 !important;
            color: white;
        }

        .btn-join {
            background: #007bff !important;
            color: white;
        }

        button:disabled {
            background: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
        }
    </style>

    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_v1.1.4.js"></script>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <div id="networkPanel">
        <div class="net-title">⚡ WASD 联机同步测试面板</div>
        <input type="text" id="roomCodeInput" maxlength="4" value="8888" placeholder="输入 4 位数字房间号">
        <div class="btn-group">
            <button id="hostBtn" class="btn-host">创房 (P1)</button>
            <button id="joinBtn" class="btn-join">加入 (P2)</button>
        </div>
        <div id="netStatus"
            style="font-size: 12px; margin-top: 10px; color: #aaa; background: rgba(255,255,255,0.1); padding: 5px; max-height: 250px; overflow-y: auto;">
            状态: 等待本地配置...</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        // 全局崩溃接管
        window.onerror = function (message, source, lineno, colno, error) {
            const errDiv = document.getElementById("netStatus");
            if (errDiv) errDiv.innerHTML += `<div style="color:red;">🚨 脚本崩溃: ${message} (第${lineno}行)</div>`;
            return false;
        };

        const canvas = document.getElementById("renderCanvas");
        let engine, scene;
        let conn = null, peer = null;
        let myRole = "SPECTATOR"; // HOST 或 CLIENT

        // 玩家对象引用
        let p1Box = null, p2Box = null;
        let p1Aggregate = null, p2Aggregate = null;

        // 键盘输入状态监听
        const inputMap = {};
        window.addEventListener("keydown", (e) => { inputMap[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { inputMap[e.key.toLowerCase()] = false; });

        // 屏幕日志输出
        const screenLog = (msg, color = "white") => {
            console.log(`[GameLog] ${msg}`);
            const debugDiv = document.getElementById("netStatus");
            if (debugDiv) {
                debugDiv.innerHTML += `<div style="color:${color}; margin-top:2px;">• ${msg}</div>`;
                debugDiv.scrollTop = debugDiv.scrollHeight; // 自动滚到最底部
            }
        };

        screenLog("Protocol Check: Local Server HTTP OK ✅", "green");

        // ==========================================
        // ⚡ P2P 网络事件绑定 (提到最前防止阻塞)
        // ==========================================
        document.getElementById("hostBtn").addEventListener("click", () => {
            screenLog("👉 收到 [创房] 点击，正在请求服务器...", "yellow");
            try {
                const code = document.getElementById("roomCodeInput").value.trim();
                if (!/^\d{4}$/.test(code)) return alert("请输入4位数字！");

                myRole = "HOST";
                disableNetButtons();
                peer = new Peer(`jam-room-${code}-HOST`);

                peer.on('open', (id) => {
                    screenLog(`房间 [ ${code} ] 创房成功！等待 P2P 握手...`, "green");
                });
                peer.on('connection', (incoming) => {
                    conn = incoming;
                    setupNetworkPipe();
                });
                peer.on('error', (err) => {
                    screenLog(`网络异常: ${err.type}`, "red");
                    enableNetButtons();
                });
            } catch (e) { screenLog(`创房崩溃: ${e.message}`, "red"); }
        });

        document.getElementById("joinBtn").addEventListener("click", () => {
            screenLog("👉 收到 [加入] 点击，正在寻路连接...", "yellow");
            try {
                const code = document.getElementById("roomCodeInput").value.trim();
                if (!/^\d{4}$/.test(code)) return alert("请输入4位数字！");

                myRole = "CLIENT";
                disableNetButtons();
                peer = new Peer(`jam-room-${code}-CLIENT`);

                peer.on('open', () => {
                    conn = peer.connect(`jam-room-${code}-HOST`);
                    setupNetworkPipe();
                });
                peer.on('error', (err) => {
                    screenLog(`连接失败: ${err.type}`, "red");
                    enableNetButtons();
                });
            } catch (e) { screenLog(`加入崩溃: ${e.message}`, "red"); }
        });

        function disableNetButtons() {
            document.getElementById("hostBtn").disabled = true;
            document.getElementById("joinBtn").disabled = true;
            document.getElementById("roomCodeInput").disabled = true;
        }
        function enableNetButtons() {
            document.getElementById("hostBtn").disabled = false;
            document.getElementById("joinBtn").disabled = false;
            document.getElementById("roomCodeInput").disabled = false;
        }

        // 核心数据管道：处理对方发来的数据
        function setupNetworkPipe() {
            if (!conn) return;
            conn.on('open', () => {
                screenLog(`🟢 P2P 联机成功！当前身份: ${myRole}`, "green");
                document.getElementById("networkPanel").style.backgroundColor = "rgba(0,40,0,0.9)";
            });

            conn.on('data', (data) => {
                if (data.type === "pos_sync") {
                    // 收到对方发来的物理状态，强制压进对应的代理方块中
                    if (myRole === "HOST" && p2Aggregate) {
                        // 主机收到客户端方块的位置和速度
                        p2Box.position.set(data.pos.x, data.pos.y, data.pos.z);
                        p2Aggregate.body.setLinearVelocity(new BABYLON.Vector3(data.vel.x, data.vel.y, data.vel.z));
                    } else if (myRole === "CLIENT" && p1Aggregate) {
                        // 客户端收到主机方块的位置和速度
                        p1Box.position.set(data.pos.x, data.pos.y, data.pos.z);
                        p1Aggregate.body.setLinearVelocity(new BABYLON.Vector3(data.vel.x, data.vel.y, data.vel.z));
                    }
                }
            });

            conn.on('close', () => {
                screenLog("❌ 对方已断开连接", "red");
                enableNetButtons();
            });
        }

        // ==========================================
        // 🎮 3D 渲染与物理世界初始化
        // ==========================================
        async function initGame() {
            try {
                engine = new BABYLON.Engine(canvas, true);
                scene = new BABYLON.Scene(engine);

                // 1. 物理引擎初始化
                const havokInstance = await HavokPhysics();
                const hk = new BABYLON.HavokPlugin(true, havokInstance);
                scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), hk);
                screenLog("物理引擎: Havok 注入成功 ✅", "green");

                // 2. 相机与灯光
                const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 12, BABYLON.Vector3.Zero(), scene);
                camera.attachControl(canvas, true);
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                light.intensity = 0.8;

                // 3. 地面 (静态物理体)
                const ground = BABYLON.MeshBuilder.CreateBox("ground", { width: 12, height: 0.5, depth: 12 }, scene);
                ground.position.y = -0.25;
                const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
                groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.2);
                ground.material = groundMat;
                new BABYLON.PhysicsAggregate(ground, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.5 }, scene);

                // 4. P1 绿色方块
                p1Box = BABYLON.MeshBuilder.CreateBox("p1Box", { size: 1 }, scene);
                p1Box.position.set(-2, 0.5, 0);
                const p1Mat = new BABYLON.StandardMaterial("p1Mat", scene);
                p1Mat.diffuseColor = new BABYLON.Color3(0, 1, 0); // 绿色
                p1Box.material = p1Mat;
                p1Aggregate = new BABYLON.PhysicsAggregate(p1Box, BABYLON.PhysicsShapeType.BOX, { mass: 5, friction: 0.2, restitution: 0.1 }, scene);

                // 5. P2 蓝色方块
                p2Box = BABYLON.MeshBuilder.CreateBox("p2Box", { size: 1 }, scene);
                p2Box.position.set(2, 0.5, 0);
                const p2Mat = new BABYLON.StandardMaterial("p2Mat", scene);
                p2Mat.diffuseColor = new BABYLON.Color3(0, 0, 1); // 蓝色
                p2Box.material = p2Mat;
                p2Aggregate = new BABYLON.PhysicsAggregate(p2Box, BABYLON.PhysicsShapeType.BOX, { mass: 5, friction: 0.2, restitution: 0.1 }, scene);

                // ==========================================
                // 🔄 每帧渲染循环 (输入处理与同步发射)
                // ==========================================
                scene.onBeforeRenderObservable.add(() => {
                    let forceX = 0;
                    let forceZ = 0;
                    const speed = 15; // 移动速度

                    // 只有联机成功后，才允许键盘控制自己对应的方块
                    if (conn && conn.open) {
                        if (inputMap["w"]) forceZ = speed;
                        if (inputMap["s"]) forceZ = -speed;
                        if (inputMap["a"]) forceX = -speed;
                        if (inputMap["d"]) forceX = speed;

                        // 依据当前身份施加冲量，并打包位置通过 P2P 轰炸给对方
                        if (myRole === "HOST") {
                            // 主机控 P1 (绿色)
                            if (forceX !== 0 || forceZ !== 0) {
                                p1Aggregate.body.setLinearVelocity(new BABYLON.Vector3(forceX, 0, forceZ));
                            }
                            // 将主机的实时位置发给客户端
                            conn.send({
                                type: "pos_sync",
                                pos: { x: p1Box.position.x, y: p1Box.position.y, z: p1Box.position.z },
                                vel: { x: p1Aggregate.body.getLinearVelocity().x, y: p1Aggregate.body.getLinearVelocity().y, z: p1Aggregate.body.getLinearVelocity().z }
                            });
                        }
                        else if (myRole === "CLIENT") {
                            // 客户端控 P2 (蓝色)
                            if (forceX !== 0 || forceZ !== 0) {
                                p2Aggregate.body.setLinearVelocity(new BABYLON.Vector3(forceX, 0, forceZ));
                            }
                            // 将客户端的实时位置发给主机
                            conn.send({
                                type: "pos_sync",
                                pos: { x: p2Box.position.x, y: p2Box.position.y, z: p2Box.position.z },
                                vel: { x: p2Aggregate.body.getLinearVelocity().x, y: p2Aggregate.body.getLinearVelocity().y, z: p2Aggregate.body.getLinearVelocity().z }
                            });
                        }
                    }
                });

                // 启动执行渲染
                engine.runRenderLoop(() => { scene.render(); });

            } catch (e) {
                screenLog(`3D系统崩溃: ${e.message}`, "red");
            }
        }

        // 延迟加载3D，确保网络按钮第一优先级可用
        setTimeout(initGame, 100);
        window.addEventListener("resize", () => { if (engine) engine.resize(); });
    </script>
</body>

</html>
